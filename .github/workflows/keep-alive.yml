# Giữ backend Render (gói Free) không ngủ: ping /api/health định kỳ.
# Sua BACKEND_URL cho dung service cua ban (khong co dau / o cuoi).
name: keep-render-awake

on:
  schedule:
    - cron: "*/10 * * * *"   # moi 10 phut (GitHub toi thieu 5 phut; hay bi tre vai phut)
  workflow_dispatch:          # cho phep bam chay tay de test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          BACKEND_URL="https://autograde-backend.onrender.com"
          echo "Pinging $BACKEND_URL/api/health"
          curl -fsS --max-time 60 "$BACKEND_URL/api/health" || echo "Ping that bai (service co the dang thuc day)"
